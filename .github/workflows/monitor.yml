name: lgtwins-monitoring-mail

# 앱이 잠들어 있어도 동작하는 독립 점검+메일 발송 (무료 GitHub Actions cron)
on:
  schedule:
    - cron: "0 * * * *"      # 1시간마다: 문제 있을 때만 메일(alert)
    - cron: "0 21 * * *"     # 매일 06:00 KST(=21:00 UTC 전날): 정기 리포트(scheduled)
    - cron: "0 9 * * *"      # 매일 18:00 KST(=09:00 UTC): 정기 리포트(scheduled)
  workflow_dispatch:          # 수동 실행 버튼 (테스트용, 항상 리포트 발송)

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Korean font (차트 한글 깨짐 방지)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-nanum
          sudo fc-cache -f
          rm -rf ~/.cache/matplotlib

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decide mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 21 * * *" ] || [ "${{ github.event.schedule }}" = "0 9 * * *" ]; then
            echo "value=scheduled" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=scheduled" >> "$GITHUB_OUTPUT"
          else
            echo "value=alert" >> "$GITHUB_OUTPUT"
          fi

      - name: Run check & send mail
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: python send_report.py --mode ${{ steps.mode.outputs.value }}
